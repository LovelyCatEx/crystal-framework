spring:
  application:
    name: springboot-template
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/db
    username: postgres
    password: 123456
    pool:
      initial-size: 5
      min-idle: 5
      max-size: 40
      max-idle-time: 30m
      max-acquire-time: 5s
      max-create-connection-time: 5s
      validation-query: SELECT 1
      validation-depth: REMOTE
  datasource:
    url: jdbc:postgresql://localhost:5432/db
    username: postgres
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      lettuce:
        pool:
          min-idle: 8
          max-idle: 16
          max-active: 40
          max-wait: 2s
        shutdown-timeout: 100ms
      timeout: 5s
      connect-timeout: 3s
  security:
    oauth2:
      client:
        provider:
          github:
            user-name-attribute: login
          google:
            user-name-attribute: name
          oicq:
            authorization-uri: https://graph.qq.com/oauth2.0/authorize
            token-uri: https://graph.qq.com/oauth2.0/token
            user-info-uri: https://graph.qq.com/user/get_user_info
        registration:
          github:
            provider: github
            client-id: your-github-client-id
            client-secret: your-github-client-secret
            scope: read:user
            redirect-uri: http://localhost:5173/auth/oauth2-code
            authorization-grant-type: authorization_code
          oicq:
            provider: oicq
            client-id: your-qq-client-id
            client-secret: your-qq-client-secret
            scope: get_user_info
            redirect-uri: http://127.0.0.1:5173/auth/oauth2-code
            authorization-grant-type: authorization_code
          google:
            provider: google
            client-id: your-google-client-id
            client-secret: your-google-client-secret
            redirect-uri: http://localhost:5173/auth/oauth2-code
            authorization-grant-type: authorization_code

  http:
    codecs:
      max-in-memory-size: 10MB
  webflux:
    multipart:
      max-in-memory-size: 10MB
  reactor:
    debug-agent:
      enabled: true
  main:
    allow-circular-references: true
crystalframework:
  auth:
    jwt:
      expiration: 7d
  resource:
    avatar:
      supported-content-types:
        - image/png
        - image/jpeg
        - image/webp
    tenant-icon:
      supported-content-types:
        - image/png
        - image/jpeg
        - image/webp
  monitor:
    flush-interval-ms: 30000
  sharding:
    snowflake:
      start-point: 0
      timestamp-length: 41
      data-center-id-length: 5
      worker-id-length: 5
      sequence-id-length: 12
      gene-id-length: 0
      data-center-id: 0
      worker-id: 0
      actual-gene-length: 0

logging:
  level:
    root: info
    org.flywaydb: info
    org.springframework.security: info
    org.springframework.web: info
    org.springframework.transaction: info
    org.springframework.r2dbc: info
    io.r2dbc.postgresql: info
    org.springframework.boot.actuate: info
    com.lovelycatv.crystalframework.shared.exception: info
server:
  reactive:
    session:
      cookie:
        secure: true
        path: /
        http-only: true
        same-site: none
        domain: localhost
  forward-headers-strategy: framework
  port: 8080

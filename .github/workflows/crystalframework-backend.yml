name: CrystalFramework - Backend Build

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - 'web/**'
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - 'web/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and install VertexLib
        run: |
          git clone https://github.com/LovelyCatEx/VertexLib.git /tmp/VertexLib
          cd /tmp/VertexLib
          mvn install -DskipTests -B

      - name: Build with Maven
        run: mvn -B package -DskipTests --file pom.xml

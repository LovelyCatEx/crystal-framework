name: CrystalFramework - Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
      create_github_release:
        description: 'Create GitHub Release'
        required: false
        default: true
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
      maven_version: ${{ steps.version.outputs.maven_version }}
      create_release: ${{ steps.version.outputs.create_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine release version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.release_version }}"
            CREATE_RELEASE="${{ github.event.inputs.create_github_release }}"
          else
            VERSION="${{ github.ref_name }}"
            CREATE_RELEASE="true"
          fi
          echo "release_version=$VERSION" >> $GITHUB_OUTPUT
          echo "maven_version=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "create_release=$CREATE_RELEASE" >> $GITHUB_OUTPUT

  backend:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and install VertexLib
        run: |
          git clone https://github.com/LovelyCatEx/VertexLib.git /tmp/VertexLib
          cd /tmp/VertexLib
          mvn install -DskipTests -B

      - name: Update version in pom.xml
        run: |
          mvn versions:set -DnewVersion=${{ needs.prepare.outputs.maven_version }} -DgenerateBackupPoms=false

      - name: Build backend JAR
        run: mvn -B clean package -DskipTests

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: crystal-starter/target/*.jar
          retention-days: 7

  frontend:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '10.33.1'
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend dependencies
        working-directory: ./web
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: ./web
        run: pnpm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist
          retention-days: 7

  create-release:
    runs-on: ubuntu-latest
    needs: [ backend, frontend, prepare ]
    if: |
      (github.event_name == 'workflow_dispatch' && needs.prepare.outputs.create_release == 'true') ||
      github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Package frontend dist
        run: |
          cd ./artifacts/frontend-dist
          zip -r ../../frontend-dist-${{ needs.prepare.outputs.release_version }}.zip .
          cd ../..

      - name: Prepare additional release assets
        run: |
          mkdir -p ./artifacts/release-assets
          cp ./.devcontainer/docker-compose.yml ./artifacts/release-assets/docker-compose.yml
          cp ./.env.example ./artifacts/release-assets/.env

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.release_version }}
          name: Release ${{ needs.prepare.outputs.release_version }}
          draft: false
          prerelease: false
          files: |
            ./artifacts/backend-jar/*.jar
            ./frontend-dist-${{ needs.prepare.outputs.release_version }}.zip
            ./artifacts/release-assets/docker-compose.yml
            ./artifacts/release-assets/.env
          generate_release_notes: true

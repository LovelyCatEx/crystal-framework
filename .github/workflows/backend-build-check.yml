name: CrystalFramework - Backend Build

on:
  push:
    branches: [ "master", "release", "develop" ]
    paths-ignore:
      - 'web/**'
      - '.devcontainer/**'
      - '.agent/**'
      - '.run/**'
      - 'docker/**'
      - 'docs/**'
      - 'readme/**'
  pull_request:
    branches: [ "master", "release", "develop" ]
    paths-ignore:
      - 'web/**'
      - '.devcontainer/**'
      - '.agent/**'
      - '.run/**'
      - 'docker/**'
      - 'docs/**'
      - 'readme/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package -DskipTests --file pom.xml

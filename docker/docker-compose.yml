name: crystalframework
services:
  postgres:
    image: postgres:15
    container_name: crystalframework-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DATABASE}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - crystalframework_postgres_data:/var/lib/postgresql/data
    networks:
      - crystalframework_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: crystalframework-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=master@lovelycatv.com
      - PGADMIN_DEFAULT_PASSWORD=master@lovelycatv.com
      - PGADMIN_CONFIG_SERVER_MODE=True
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=True
    ports:
      - "5050:80"
    volumes:
      - crystalframework_pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crystalframework_network

  redis:
    image: redis:8.2
    container_name: crystalframework-redis
    command: redis-server --requirepass $REDIS_PASSWORD
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - crystalframework_redis_data:/data
    networks:
      - crystalframework_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 3s
      timeout: 5s
      retries: 5

  snailjob:
    container_name: crystalframework-snailjob
    build:
      context: dev/snail-job
      dockerfile: Dockerfile
    environment:
      - SNAILJOB_DATASOURCE_HOST=postgres
      - SNAILJOB_DATASOURCE_PORT=5432
      - SNAILJOB_DATASOURCE_DATABASE=${POSTGRES_DATABASE}
      - SNAILJOB_DATASOURCE_USERNAME=${POSTGRES_USERNAME}
      - SNAILJOB_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SNAILJOB_REDIS_HOST=redis
      - SNAILJOB_REDIS_PORT=6379
      - SNAILJOB_REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "${SNAILJOB_SERVER_WEB_PORT}:8080"
      - "${SNAILJOB_SERVER_PORT}:17888"
    volumes:
      - ./config/snail-job:/app/config:ro
    networks:
      - crystalframework_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${SNAILJOB_SERVER_PORT}/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    container_name: crystalframework-backend
    build:
      context: ../
      dockerfile: Dockerfile
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USERNAME=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - OAUTH_GITHUB_CLIENT_ID=${OAUTH_GITHUB_CLIENT_ID}
      - OAUTH_GITHUB_CLIENT_SECRET=${OAUTH_GITHUB_CLIENT_SECRET}
      - OAUTH_GITHUB_REDIRECT_URL=${OAUTH_GITHUB_REDIRECT_URL}
      - OAUTH_GOOGLE_CLIENT_ID=${OAUTH_GOOGLE_CLIENT_ID}
      - OAUTH_GOOGLE_CLIENT_SECRET=${OAUTH_GOOGLE_CLIENT_SECRET}
      - OAUTH_GOOGLE_REDIRECT_URL=${OAUTH_GOOGLE_REDIRECT_URL}
      - OAUTH_OICQ_CLIENT_ID=${OAUTH_OICQ_CLIENT_ID}
      - OAUTH_OICQ_CLIENT_SECRET=${OAUTH_OICQ_CLIENT_SECRET}
      - OAUTH_OICQ_REDIRECT_URL=${OAUTH_OICQ_REDIRECT_URL}
      - BACKEND_PORT=${BACKEND_PORT}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      - SNOWFLAKE_DATA_CENTER_ID=${SNOWFLAKE_DATA_CENTER_ID:-0}
      - SNOWFLAKE_WORKER_ID=${SNOWFLAKE_WORKER_ID:-0}
      - SNAILJOB_SERVER_HOST=snailjob
      - SNAILJOB_SERVER_PORT=17888
      - SNAILJOB_NAMESPACE_NAME=${SNAILJOB_NAMESPACE_NAME}
      - SNAILJOB_NAMESPACE_ID=${SNAILJOB_NAMESPACE_ID}
      - SNAILJOB_GROUP_NAME=${SNAILJOB_GROUP_NAME}
      - SNAILJOB_GROUP_TOKEN=${SNAILJOB_GROUP_TOKEN}
    ports:
      - "${BACKEND_PORT}:8080"
    volumes:
      - crystalframework_backend_data:/app/data
    networks:
      - crystalframework_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    container_name: crystalframework-frontend
    build:
      context: ../web
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - crystalframework_network

volumes:
  crystalframework_postgres_data:
  crystalframework_pgadmin_data:
  crystalframework_redis_data:
  crystalframework_backend_data:

networks:
  crystalframework_network:
    driver: bridge